spring.application.name=saasprint
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
com.saasprint.secret-key=akashgupta
spring.security.oauth2.client.registration.google.client-id=${DB_USERNAME}
spring.security.oauth2.client.registration.google.client-secret=${DB_USERNAME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

aws.access.key=${AWS_ACCESS_KEY}
aws.secret.key=${AWS_SECRET_KEY:}
aws.region=${AWS_REGION}
aws.bucket.name=${AWS_BUCKET}
spring.mode=development

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ---- Mail ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME} 
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.transport.protocol=smtp
spring.mail.debug=true

spring.output.ansi.enabled=ALWAYS

server.port=${PORT:8080}

# ---- CORS ----
spring.web.cors.allowed-origins=${CORS_ORIGINS}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ---- Logging ----
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

spring.elasticsearch.uris=${ELASTIC_SERVER}